name: better_help
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  change_app_package_name: ^1.5.0
  get: ^4.7.2
  get_storage: ^2.1.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.0
  syncfusion_flutter_datepicker: ^28.1.38
  pinput: ^5.0.1
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  device_info_plus: ^11.5.0
  persistent_bottom_nav_bar: ^6.2.1
  carousel_slider: ^5.1.1
  easy_date_timeline: ^2.0.9
  simple_circular_progress_bar: ^1.0.2
  fl_chart: ^1.0.0
  animated_custom_dropdown: ^3.1.1
  socket_io_client: ^3.1.2
  percent_indicator: ^4.2.5
  device_preview: ^1.3.1
  connectivity_plus: ^7.0.0
  pretty_dio_logger: ^1.4.0
  dio: ^5.9.0
  shared_preferences: ^2.5.4
  awesome_snackbar_content: ^0.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  dependency_validator: any


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animated/daily_affermation/
    - assets/animated/questionaries/
  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf